name: Documentation
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: "**/*.md"
      - uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --offline "**/*.md"
          fail: true
