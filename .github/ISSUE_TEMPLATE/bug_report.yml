name: Bug report
description: Report reproducible incorrect behaviour
title: "[Bug]: "
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: "Do not report security vulnerabilities here; use SECURITY.md."
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect?
    validations: {required: true}
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide minimal commands, configuration with secrets removed, and fixture data if possible.
    validations: {required: true}
  - type: input
    id: version
    attributes: {label: Version or commit}
    validations: {required: true}
  - type: input
    id: python
    attributes: {label: Python and operating system}
    validations: {required: true}
  - type: textarea
    id: logs
    attributes: {label: Relevant logs, description: Remove credentials and private source content.}
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues.
          required: true
        - label: This is not a security report.
          required: true
